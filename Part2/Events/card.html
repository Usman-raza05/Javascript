<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Project</title>
    <style>
         * {
            margin: 0;
            box-sizing: border-box;
            font-family: system-ui;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }

        #main {
            /* display: flex;
            justify-content: center;
            align-items: center; */
            padding: 50px;
            color: #555;
            height: 100%;
            width: 100%;
            background-color: #222;
            gap: 5px;
        }
         input {
            display: block;
        }
         .card {
            width: 300px;
            height: 200px;
            overflow: auto;
            color: #fff;
            display: inline-block;
            margin-top: 40px;
            margin: 5px;
            padding: 23px;
            border: 1px solid #555;
            border-radius: 10px;
        }
        .card::-webkit-scrollbar{
            display: none;
        }

        .profile {
            height: 50px;
            width: 50px;
            border-radius: 50%;
            margin-bottom: 7px;
            overflow: hidden;
        }

        .profile img {
            height: 100%;
            width: 100%;
            object-fit: cover;
        }

        .card h5 {
            margin-top: 3px;
        }

        .card p {
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
     <div id="main">
        <form action="">
            <input type="text" placeholder="Profile pic">
            <input type="text" placeholder="Name">
            <input type="text" placeholder="Occupation">
            <input type="text" placeholder="Info">
            <input type="submit" value="Submit">
        </form>
