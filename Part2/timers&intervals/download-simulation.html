<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Simulation</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Download File</h1>

    <div class="glass-card">

        <div class="file-info">
            <span>example_file.zip</span>
            <span class="size">120 MB</span>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="progress-text">
            <span id="percent">0%</span>
            <span id="speed">0 MB/s</span>
        </div>

        <button class="download-btn">Start Download</button>

    </div>

</div>

<script src="download-simulation.js"></script>
</body>
</html>
